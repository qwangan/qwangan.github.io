name: Update publications

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Use 'missing' to fill blanks or 'refresh' to update existing fields"
        required: true
        default: missing
        type: choice
        options:
          - missing
          - refresh
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install -r requirements-publications.txt

      - name: Refresh publication metadata
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            MODE=refresh
          fi
          python scripts/update_publications.py --write --mode "$MODE"

      - name: Create pull request when publications changed
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: automated/publications-${{ github.run_id }}
        run: |
          if git diff --quiet -- _pages/publications.yml; then
            echo "No publication changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add _pages/publications.yml
          git commit -m "Update publications metadata"
          git push origin "$BRANCH_NAME"
          gh pr create \
            --title "Update publications metadata" \
            --body "Automated DOI/arXiv metadata refresh for _pages/publications.yml." \
            --base master \
            --head "$BRANCH_NAME"
