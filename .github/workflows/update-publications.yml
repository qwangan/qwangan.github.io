name: Update publications

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Use 'missing' to fill blanks/finalize provisional venues or 'refresh' to update existing fields"
        required: true
        default: refresh
        type: choice
        options:
          - missing
          - refresh
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install -r requirements-publications.txt

      - name: Refresh publication metadata
        run: python scripts/update_publications.py --write --mode "${{ github.event.inputs.mode || 'refresh' }}"

      - name: Commit publication metadata when changed
        run: |
          if git diff --quiet -- _pages/publications.yml; then
            echo "No publication changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _pages/publications.yml
          git commit -m "Update publications metadata"
          git push
