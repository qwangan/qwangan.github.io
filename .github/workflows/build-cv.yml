name: Build CV PDF

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "_pages/activities.yml"
      - "_pages/appointment.yml"
      - "_pages/education.yml"
      - "_pages/interests.yml"
      - "_pages/publications.yml"
      - "_pages/service.yml"
      - "_pages/site.yml"
      - "_pages/teaching.yml"
      - "_pages/visits.yml"
      - "cv-source/**"
      - "scripts/build_cv.rb"
      - ".github/workflows/build-cv.yml"

permissions:
  contents: write

jobs:
  build-cv:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-fonts-recommended

      - name: Build CV from website data
        run: ruby scripts/build_cv.rb

      - name: Commit generated CV when changed
        run: |
          if git diff --quiet -- files/Curriculum_Vitae.pdf cv-source/Curriculum_Vitae.tex; then
            echo "CV is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add files/Curriculum_Vitae.pdf cv-source/Curriculum_Vitae.tex
          git commit -m "Build CV PDF from website data"
          git push
