name: Build CV PDF Draft

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-cv-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-fonts-recommended

      - name: Build draft CV from website data
        run: ruby scripts/build_cv.rb --draft-output

      - name: Upload draft CV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-draft
          path: |
            .cv-build/Curriculum_Vitae.pdf
            cv-source/Curriculum_Vitae.tex
